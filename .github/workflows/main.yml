name: main

on:
  push:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: cachix/install-nix-action@56a7bb7b56d9a92d4fd1bc05758de7eea4a370a8 # v31.6.0
      - name: Install
        run: nix develop --command pnpm install
      - name: Format
        run: nix develop --command pnpm format
      - name: Type Check
        run: nix develop --command pnpm type-check
      - name: Lint
        run: nix develop --command pnpm lint

  release:
    runs-on: ubuntu-latest
    needs: quality
    if: success() && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: cachix/install-nix-action@56a7bb7b56d9a92d4fd1bc05758de7eea4a370a8 # v31.6.0
      - name: Install
        run: nix develop --command pnpm install
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: nix develop --command pnpm release
